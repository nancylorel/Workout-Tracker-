::-webkit-scrollbar { display: none; }

<body>
<div id="root"></div>
<script type="text/babel">

const DAYS = [
  {
    id:"push", label:"DÍA A", day:"PUSH", focus:"Pecho · Hombros · Tríceps · Core",
    time:"~48 min", color:"#1B4F72", accent:"#2E86C1",
    exercises:[
      {id:"p1", name:"Dumbbell Bench Press", sets:"4", reps:"8-10", rest:"90 seg", note:"Último set cerca del fallo. Baja despacio (2 seg), explota arriba. Codos a 45° del cuerpo, no abiertos al máximo."},
      {id:"p2", name:"Cable Fly", sets:"3", reps:"10-12", rest:"75 seg", note:"Movimiento lento y controlado. Siente el estiramiento en el pecho. No uses demasiado peso — la forma lo es todo aquí."},
      {id:"p3", name:"Dumbbell Shoulder Press", sets:"3", reps:"8-10", rest:"90 seg", note:"Sentado o de pie. Palmas mirando al frente. No bloquees los codos arriba. Más rango natural que el Smith."},
      {id:"p4", name:"Dumbbell Lateral Raise", sets:"3", reps:"12-15", rest:"60 seg", note:"Peso ligero, forma perfecta. Codos ligeramente doblados, sube hasta altura del hombro. No balancees el cuerpo."},
      {id:"p5", name:"Cable Face Pull", sets:"3", reps:"12-15", rest:"60 seg", note:"NUNCA saltar este. Protege el manguito rotador a largo plazo. Polea alta, jala hacia la frente, codos arriba."},
      {id:"p6", name:"Tricep Pushdown (cable)", sets:"3", reps:"10-12", rest:"60 seg", note:"Codos pegados al cuerpo, no los muevas. Solo extiende el antebrazo. Controla la subida."},
      {id:"p7", name:"Plank", sets:"3", reps:"40-60 seg", rest:"45 seg", note:"Core apretado, no dejes caer las caderas. Progresión: añade 5 segundos cada semana."},
      {id:"p8", name:"Hanging Knee Raise", sets:"3", reps:"12-15", rest:"45 seg", note:"Colgado de barra. Sube rodillas controlado, baja sin dejar caer. Si no hay barra, tumbado en banco."},
    ]
  },
  {
    id:"pull", label:"DÍA B", day:"PULL", focus:"Espalda · Bíceps · Antebrazo",
    time:"~48 min", color:"#1A5E20", accent:"#27AE60",
    exercises:[
      {id:"b1", name:"Lat Pulldown", sets:"4", reps:"8-10", rest:"90 seg", note:"ELLA: agarre cerrado o neutro (manos a ancho de hombros), codos pegados → activa centro de espalda, NO ensancha.\nÉL: agarre ancho (más allá de los hombros), codos hacia afuera → dorsal lateral, efecto V.\nJala al pecho, nunca detrás del cuello."},
      {id:"b2", name:"Seated Cable Row", sets:"3", reps:"8-10", rest:"90 seg", note:"ELLA: agarre neutro cerrado (manija en V), codos pegados → grosor sin anchura.\nÉL: agarre ancho con barra, codos afuera → ancho + grosor.\nAprieta los omóplatos al final de cada rep."},
      {id:"b3", name:"Rear Delt Fly (mancuerna)", sets:"3", reps:"12-15", rest:"60 seg", note:"Inclinado hacia adelante, brazos casi rectos. Levanta hacia los lados hasta altura de hombro. Trabaja deltoides posterior y trapecios."},
      {id:"b4", name:"Back Extension Machine", sets:"3", reps:"12-15", rest:"60 seg", note:"Espalda baja. Peso ligero al principio. Sube hasta posición neutral, no hiperextiendas. Previene dolores lumbares."},
      {id:"b5", name:"Dumbbell Curl", sets:"3", reps:"8-10", rest:"75 seg", note:"Alterna brazos o ambos a la vez. No balancees el cuerpo. Aprieta el bíceps arriba del todo."},
      {id:"b6", name:"Hammer Curl", sets:"3", reps:"10-12", rest:"60 seg", note:"Palmas mirando hacia adentro durante todo el movimiento. Trabaja braquial y braquiorradial además del bíceps."},
      {id:"b7", name:"Wrist Curl (mancuerna)", sets:"2", reps:"12-15", rest:"45 seg", note:"Antebrazo apoyado en el muslo o banco. Flexiona la muñeca hacia arriba. Peso muy ligero."},
      {id:"b8", name:"Reverse Curl (mancuerna)", sets:"2", reps:"12-15", rest:"45 seg", note:"Igual que el curl normal pero palmas mirando hacia abajo. Trabaja el extensor del antebrazo. Peso más ligero que el curl normal."},
    ]
  },
  {
    id:"lower", label:"DÍA C", day:"LOWER BODY", focus:"Quads · Hámstrings · Pantorrillas",
    time:"~50 min", color:"#4A235A", accent:"#8E44AD",
    exercises:[
      {id:"l1", name:"Bulgarian Split Squat", sets:"3", reps:"8-10/pierna", rest:"90 seg", note:"Pie trasero en banco, pie delantero adelante. Baja hasta 90°, rodilla delantera no pasa la punta del pie. PRIMERAS SEMANAS: aprende el balance sin peso. El mejor ejercicio de pierna que existe."},
      {id:"l2", name:"Leg Press", sets:"3", reps:"10-12", rest:"90 seg", note:"Pies a ancho de hombros. Baja hasta 90°. NO bloquees las rodillas arriba. Carga progresiva — tu ejercicio heavy de pierna."},
      {id:"l3", name:"Leg Extension Machine", sets:"3", reps:"12-15", rest:"60 seg", note:"Aislamiento puro de quad. Aprieta arriba 1 segundo. Baja controlado. No uses impulso."},
      {id:"l4", name:"Leg Curl Machine", sets:"3", reps:"10-12", rest:"75 seg", note:"El más efectivo para isquiotibial. Control total en la bajada. Último set cerca del fallo."},
      {id:"l5", name:"Romanian Deadlift (mancuerna)", sets:"3", reps:"8-10", rest:"90 seg", note:"Espalda neutra siempre. Baja deslizando las mancuernas por las piernas hasta sentir estiramiento en hámstring. No dobles la espalda."},
      {id:"l6", name:"Standing Calf Raise", sets:"3", reps:"12-15", rest:"60 seg", note:"De pie, sube en punta de pies lo más alto posible. Baja hasta sentir el estiramiento. Pausa 1 seg arriba."},
      {id:"l7", name:"Seated Calf Raise", sets:"3", reps:"12-15", rest:"60 seg", note:"Trabaja el sóleo (músculo profundo), diferente al de pie. Rodillas a 90°. Pausa arriba y estiramiento abajo."},
    ]
  },
  {
    id:"glutes", label:"DÍA D", day:"GLÚTEOS + CORE", focus:"Glúteos · Aducción · Abducción · Core",
    time:"~43-59 min", color:"#6E2F0A", accent:"#E67E22",
    exercises:[
      {id:"g1", name:"Hip Thrust (mancuerna o barra)", sets:"4", reps:"8-10", rest:"90 seg", note:"Ejercicio principal — hazlo pesado y con intención. Espalda apoyada en banco. Empuja caderas arriba y APRIETA el glúteo 1 segundo completo antes de bajar. Ese segundo lo cambia todo. Progresión semanal aquí es clave."},
      {id:"g2", name:"Hip Abductor Machine (torso inclinado)", sets:"3", reps:"12-15", rest:"60 seg", note:"CLAVE: inclina el torso hacia adelante ~30° antes de abrir. Esa inclinación activa el glúteo medio mucho más que sentada recta. Aprieta en la apertura máxima."},
      {id:"g3", name:"Hip Adductor Machine ó Sumo Squat puntas afuera", sets:"3", reps:"12-15", rest:"60 seg", note:"ESCOGE según el día:\n• Adductor Machine — aislamiento puro muslo interno, sentada.\n• Sumo Squat — pies bien abiertos, puntas afuera, mancuerna al centro. Más funcional.\nAlterna cuando quieras evolucionar."},
      {id:"g4", name:"Polea abducción diagonal hacia atrás", sets:"3", reps:"12-15", rest:"60 seg", note:"Tobillera en polea baja. Párate de lado a la máquina y lleva la pierna hacia atrás en DIAGONAL — no recto atrás. Trabaja la parte alta y externa del glúteo que el kickback normal no alcanza. Aprieta 1 seg en la extensión máxima."},
      {id:"g5", name:"Bulgarian Split Squat inclinado", sets:"3", reps:"8-10/pierna", rest:"90 seg", note:"Pie trasero en banco. CLAVE: inclina el torso ligeramente hacia adelante — transfiere el trabajo del quad al glúteo. Baja controlado hasta 90°. La inclinación es lo que lo diferencia del Bulgarian normal."},
      {id:"g6", name:"Hiperextensión 1 seg arriba", sets:"3", reps:"12-15", rest:"60 seg", note:"OPCIONAL · Banco de hiperextensión a 45°. Baja el torso y sube. Al llegar arriba APRIETA el glúteo 1 segundo antes de bajar. Trabaja el glúteo en posición ESTIRADA — complemento perfecto del Hip Thrust. También fortalece espalda baja."},
      {id:"g7", name:"Cable Woodchop", sets:"3", reps:"12/lado", rest:"60 seg", note:"OPCIONAL · Oblicuos. Párate de lado a la polea, agarra con ambas manos y jala en diagonal rotando el torso. Los pies no se mueven. Como cortando leña."},
      {id:"g8", name:"Russian Twist (con peso)", sets:"3", reps:"20 (10/lado)", rest:"45 seg", note:"OPCIONAL · Oblicuos. Sentada en el suelo, pies levantados, disco o mancuerna ligera. Gira de lado a lado controlado."},
      {id:"g9", name:"Hanging Knee Raise", sets:"3", reps:"12-15", rest:"45 seg", note:"OPCIONAL · Abdomen inferior. Colgado de barra, sube rodillas controlado. Si no hay barra, tumbado en banco."},
    ]
  }
];

const EMPTY_FREE_EX = () => ({id: Date.now().toString(), name:"", weight:"", sets:"", reps:"", done:false});

const SUPPLEMENTAL = [
  {
    category: "PUSH — Pecho / Hombros / Tríceps",
    color: "#2E86C1",
    exercises: [
      {id:"s_p1", name:"Overhead Tricep Extension (cable)", note:"Tríceps largo — el que da volumen al brazo. Polea alta, cuerda hacia atrás. Extiende completamente. Buena alternativa al Pushdown para variar."},
      {id:"s_p2", name:"Pec Deck Machine", note:"Aislamiento de pecho. Squeeze al cerrar, retorno controlado. Buena opción si el Cable Fly está ocupado."},
      {id:"s_p3", name:"Dumbbell Incline Press", note:"Banco inclinado 30-45°. Trabaja la parte superior del pecho que el press plano no llega tan bien. Añade definición arriba del pecho."},
      {id:"s_p4", name:"Arnold Press", note:"Variación del Shoulder Press. Empieza con palmas hacia ti y rota al subir. Trabaja todas las cabezas del deltoides. Más completo que el press normal."},
    ]
  },
  {
    category: "PULL — Espalda / Bíceps",
    color: "#27AE60",
    exercises: [
      {id:"s_b1", name:"Dumbbell One-Arm Row", note:"Apoyo en banco. Jala el codo hacia arriba, no el peso. Excelente para grosor de espalda unilateral. Lo quitamos por redundancia pero sigue siendo efectivo."},
      {id:"s_b2", name:"Reverse Fly en máquina", note:"Deltoides posterior y romboides. Siéntate al revés en la máquina de pec deck. Abre los brazos hacia atrás. Mejora postura y contrarresta el trabajo de pecho."},
      {id:"s_b3", name:"Cable Straight-Arm Pulldown", note:"De pie, polea alta, brazos casi rectos. Jala hacia abajo. Activa el dorsal sin involucrar bíceps — aislamiento puro de espalda."},
      {id:"s_b4", name:"Concentration Curl", note:"Sentado, codo apoyado en el muslo. Máximo aislamiento de bíceps. Para cuando quieres pico y definición."},
    ]
  },
  {
    category: "LOWER BODY — Pierna",
    color: "#8E44AD",
    exercises: [
      {id:"s_l1", name:"Goblet Squat (mancuerna)", note:"Mancuerna al pecho, pies a ancho de hombros. Baja lento y profundo. Buena opción de calentamiento antes del Bulgarian o cuando estás aprendiendo la sentadilla."},
      {id:"s_l2", name:"Leg Press pies altos", note:"En el Leg Press, sube los pies hacia la parte alta de la plataforma. Activa más glúteo y hámstring que la posición normal. Buena variación para el Día C."},
      {id:"s_l3", name:"Walking Lunges (mancuerna)", note:"Pasos alternos hacia adelante con mancuernas. Trabaja quad, glúteo y balance. Más dinámico que la estocada estática."},
      {id:"s_l4", name:"Calf Raise en escalón", note:"Un pie en el borde de un escalón o plataforma. Rango de movimiento completo — más profundo que la versión en máquina. Muy efectivo para pantorrilla."},
    ]
  },
  {
    category: "GLÚTEOS",
    color: "#E67E22",
    exercises: [
      {id:"s_g1", name:"Sentadilla + Reversa", note:"Sentadilla normal seguida inmediatamente de un paso atrás (reverse lunge). La sentadilla carga el glúteo y el paso atrás lo activa en extensión. 10 reps = 5 de cada lado."},
      {id:"s_g2", name:"Puente de glúteo en suelo (Glute Bridge)", note:"Tumbada en el suelo, pies apoyados, sube las caderas. Versión más básica del Hip Thrust. Buena opción de calentamiento o activación antes del Hip Thrust."},
      {id:"s_g3", name:"Cable Kickback recto", note:"Tobillera en polea baja. Lleva la pierna recto hacia atrás (vs la diagonal del ejercicio principal). Aislamiento del glúteo mayor. Aprieta 1 seg arriba."},
      {id:"s_g4", name:"Frog Pump", note:"Tumbada en el suelo, plantas de los pies juntas formando diamante con las piernas. Sube las caderas. Activa el glúteo desde un ángulo diferente. Alta repetición — 20-25 reps."},
    ]
  },
  {
    category: "CORE",
    color: "#C8AA64",
    exercises: [
      {id:"s_c1", name:"Dead Bug", note:"Tumbada boca arriba, brazos al techo, rodillas a 90°. Baja el brazo derecho y la pierna izquierda simultáneamente sin tocar el suelo. Alterna. Activa el core profundo."},
      {id:"s_c2", name:"Ab Wheel (rueda abdominal)", note:"De rodillas, rueda hacia adelante lo más que puedas sin que la espalda baja toque. Regresa controlado. Uno de los mejores ejercicios de core que existen. Empieza con poco rango."},
      {id:"s_c3", name:"Plank lateral", note:"De lado, apoyada en el antebrazo. Caderas arriba, cuerpo recto. Trabaja oblicuos y core lateral. 30-45 seg por lado."},
      {id:"s_c4", name:"Bicycle Crunch", note:"Tumbada, manos detrás de la cabeza. Alterna codo al lado opuesto mientras extiendes la otra pierna. Lento y controlado — no es una carrera."},
    ]
  }
];

const DAY_LABELS = {push:"Push",pull:"Pull",lower:"Lower Body",glutes:"Glúteos+Core",free:"Sesión Libre"};
const DAY_COLORS = {push:"#2E86C1",pull:"#27AE60",lower:"#8E44AD",glutes:"#E67E22",free:"#C8AA64"};

function formatDate(ds){return new Date(ds).toLocaleDateString("es-ES",{weekday:"short",month:"short",day:"numeric"});}
function getWeekKey(ds){const d=new Date(ds);const j=new Date(d.getFullYear(),0,1);const w=Math.ceil(((d-j)/86400000+j.getDay()+1)/7);return`${d.getFullYear()}-W${String(w).padStart(2,"0")}`;}

const store={
  get:(k)=>{try{const v=localStorage.getItem(k);return v?{value:v}:null;}catch(e){return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,v);}catch(e){}}
};

function App(){
  const [activeDay,setActiveDay]=React.useState("push");
  const [checked,setChecked]=React.useState({});
  const [weights,setWeights]=React.useState({});
  const [extras,setExtras]=React.useState({});
  const [completedDays,setCompletedDays]=React.useState({});
  const [history,setHistory]=React.useState([]);
  const [suppChecked,setSuppChecked]=React.useState({});
  const [expandedNote,setExpandedNote]=React.useState(null);
  const [expandedSupp,setExpandedSupp]=React.useState(null);
  const [view,setView]=React.useState("workout");

  const [freeDay, setFreeDay] = React.useState({exercises:[], completed:false, date:""});

  React.useEffect(()=>{
    const load=(k,fn)=>{try{const r=store.get(k);if(r)fn(JSON.parse(r.value));}catch(e){}};
    load("vt_checked",setChecked);
    load("vt_weights",setWeights);
    load("vt_extras",setExtras);
    load("vt_completed",setCompletedDays);
    load("vt_history",setHistory);
    load("vt_supp",setSuppChecked);
    load("vt_freeday",setFreeDay);
  },[]);

  function saveFreeDay(updated){setFreeDay(updated);store.set("vt_freeday",JSON.stringify(updated));}

  function addFreeEx(){
    const updated={...freeDay,exercises:[...freeDay.exercises,EMPTY_FREE_EX()]};
    saveFreeDay(updated);
  }
  function updateFreeEx(id,field,val){
    const updated={...freeDay,exercises:freeDay.exercises.map(ex=>ex.id===id?{...ex,[field]:val}:ex)};
    saveFreeDay(updated);
  }
  function toggleFreeEx(id){
    const updated={...freeDay,exercises:freeDay.exercises.map(ex=>ex.id===id?{...ex,done:!ex.done}:ex)};
    saveFreeDay(updated);
  }
  function deleteFreeEx(id){
    const updated={...freeDay,exercises:freeDay.exercises.filter(ex=>ex.id!==id)};
    saveFreeDay(updated);
  }
  function markFreeDone(){
    const today=new Date().toISOString().split("T")[0];
    const done=freeDay.exercises.filter(ex=>ex.done).length;
    const entry={dayId:"free",date:today,total:freeDay.exercises.length,done};
    const nh=[entry,...history].slice(0,300);
    setHistory(nh);store.set("vt_history",JSON.stringify(nh));
    const updated={...freeDay,completed:true,date:today};
    saveFreeDay(updated);
  }
  function resetFreeDay(){
    const updated={exercises:freeDay.exercises.map(ex=>({...ex,done:false})),completed:false,date:""};
    saveFreeDay(updated);
  }

  function toggleCheck(id){const n={...checked,[id]:!checked[id]};setChecked(n);store.set("vt_checked",JSON.stringify(n));}
  function setWeight(id,val){const n={...weights,[id]:val};setWeights(n);store.set("vt_weights",JSON.stringify(n));}
  function setExtra(dayId,val){const n={...extras,[dayId]:val};setExtras(n);store.set("vt_extras",JSON.stringify(n));}
  function toggleSupp(id){const n={...suppChecked,[id]:!suppChecked[id]};setSuppChecked(n);store.set("vt_supp",JSON.stringify(n));}

  function markDone(dayId){
    const today=new Date().toISOString().split("T")[0];
    const nc={...completedDays,[dayId]:today};setCompletedDays(nc);store.set("vt_completed",JSON.stringify(nc));
    const day=DAYS.find(d=>d.id===dayId);
    const done=day.exercises.filter(ex=>checked[ex.id]).length;
    const entry={dayId,date:today,total:day.exercises.length,done};
    const nh=[entry,...history].slice(0,300);setHistory(nh);store.set("vt_history",JSON.stringify(nh));
  }

  function resetDay(dayId){
    const day=DAYS.find(d=>d.id===dayId);
    const nc={...checked};day.exercises.forEach(ex=>{delete nc[ex.id];});setChecked(nc);store.set("vt_checked",JSON.stringify(nc));
    const nd={...completedDays};delete nd[dayId];setCompletedDays(nd);store.set("vt_completed",JSON.stringify(nd));
  }

  const cd=DAYS.find(d=>d.id===activeDay);
  const doneCount=cd.exercises.filter(ex=>checked[ex.id]).length;
  const total=cd.exercises.length;
  const pct=Math.round((doneCount/total)*100);

  const totalSessions=history.length;
  const totalMins=history.reduce((a,e)=>a+(e.dayId==="push"?48:e.dayId==="pull"?48:e.dayId==="lower"?50:45),0);
  const weekMap={};history.forEach(e=>{const wk=getWeekKey(e.date);if(!weekMap[wk])weekMap[wk]=[];weekMap[wk].push(e);});
  const weeks=Object.entries(weekMap).sort((a,b)=>b[0].localeCompare(a[0]));
  let streak=0;for(const[,en]of weeks){if(en.length>=3)streak++;else break;}
  const last8=weeks.slice(0,8).reverse();

  const navBtn=(active)=>({flex:1,padding:"11px 2px",border:"none",background:"transparent",color:active?"#C8AA64":"#6A7D8F",fontSize:8,letterSpacing:1,cursor:"pointer",borderBottom:active?"2px solid #C8AA64":"2px solid transparent",fontFamily:"monospace",fontWeight:"bold"});

  const TABS=[{id:"workout",label:"WORKOUT"},{id:"libre",label:"DÍA E"},{id:"suplementarios",label:"EXTRAS"},{id:"historial",label:"HISTORIAL"},{id:"tips",label:"TIPS"},{id:"rest",label:"DESCANSO"}];

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0D1B2A 0%,#1B2838 50%,#0D1B2A 100%)",paddingBottom:48}}>

      {/* Header */}
      <div style={{background:"linear-gradient(180deg,#0A1628 0%,transparent 100%)",padding:"22px 20px 14px",textAlign:"center",borderBottom:"1px solid rgba(200,170,100,0.2)"}}>
        <div style={{fontSize:11,letterSpacing:6,color:"#C8AA64",marginBottom:4,fontFamily:"monospace"}}>VANTERRA GROUP</div>
        <div style={{fontSize:24,fontWeight:"bold",letterSpacing:2,color:"#F0E6CC"}}>EL WORKOUT</div>
        <div style={{fontSize:11,color:"#8A9BB5",marginTop:4,letterSpacing:1}}>Push · Pull · Lower · Glúteos</div>
      </div>

      {/* Nav */}
      <div style={{display:"flex",borderBottom:"1px solid rgba(200,170,100,0.15)",background:"rgba(0,0,0,0.3)"}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setView(t.id)} style={navBtn(view===t.id)}>{t.label}</button>)}
      </div>

      {/* ── WORKOUT ── */}
      {view==="workout"&&(
        <div>
          <div style={{display:"flex",gap:6,padding:"12px 12px 6px",overflowX:"auto"}}>
            {DAYS.map(day=>{
              const isDone=completedDays[day.id];const isActive=activeDay===day.id;
              return(
                <button key={day.id} onClick={()=>setActiveDay(day.id)} style={{flex:1,minWidth:66,padding:"9px 4px",borderRadius:8,border:"none",background:isActive?`linear-gradient(135deg,${day.color},${day.accent})`:isDone?"rgba(50,80,50,0.4)":"rgba(255,255,255,0.06)",cursor:"pointer",position:"relative",boxShadow:isActive?`0 4px 20px ${day.accent}40`:"none"}}>
                  <div style={{fontSize:8,letterSpacing:2,color:isActive?"rgba(255,255,255,0.7)":"#4A6070",fontFamily:"monospace"}}>{day.label}</div>
                  <div style={{fontSize:10,fontWeight:"bold",color:isActive?"#fff":"#8A9BB5",marginTop:2}}>{day.day}</div>
                  {isDone&&<div style={{position:"absolute",top:3,right:5,fontSize:9,color:"#4CAF50"}}>✓</div>}
                </button>
              );
            })}
          </div>

          <div style={{padding:"6px 12px 10px"}}>
            <div style={{background:`linear-gradient(135deg,${cd.color}CC,${cd.accent}44)`,borderRadius:10,padding:"13px 15px",border:`1px solid ${cd.accent}40`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontSize:17,fontWeight:"bold",color:"#F0E6CC",letterSpacing:1}}>{cd.day}</div>

            <div key={i} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"14px 16px",marginBottom:10,fontSize:15,color:"#C8D8E8"}}>{opt}</div>
          ))}
          <div style={{marginTop:6,padding:"13px 16px",background:"rgba(50,80,50,0.3)",borderRadius:10,border:"1px solid rgba(76,175,80,0.25)"}}>
            <div style={{fontSize:12,color:"#7CB87E",lineHeight:1.6}}><strong>Ideal:</strong> Caminata 20-25 min + 10 min de estiramiento.</div>
          </div>
          <div style={{marginTop:10,padding:"13px 16px",background:"rgba(200,100,50,0.1)",borderRadius:10,border:"1px solid rgba(200,100,50,0.2)"}}>
            <div style={{fontSize:12,color:"#D4876A",lineHeight:1.6}}><strong>Evitar:</strong> Ejercicio intenso los días libres. El músculo crece descansando.</div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
