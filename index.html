<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0D1B2A"/>
<title>Couples Workout · Vanterra</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0D1B2A; font-family: Georgia, 'Times New Roman', serif; color: #E8DCC8; overscroll-behavior: none; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const DAYS = [
  {
    id:"monday",label:"DAY 1",day:"MONDAY",focus:"Chest + Triceps + Shoulders + Core",
    time:"~60 min",color:"#1B4F72",accent:"#2E86C1",
    exercises:[
      {id:"m1",name:"Chest Press Machine",sets:"3",reps:"12-15",rest:"60 sec",who:"Both",note:"Start here - warm up the chest first"},
      {id:"m2",name:"Dumbbell Flat Press",sets:"3",reps:"12",rest:"60 sec",who:"Both",note:"Use a bench - natural range of motion, better than machine alone"},
      {id:"m3",name:"Pec Deck Machine",sets:"3",reps:"12-15",rest:"60 sec",who:"Both",note:"Squeeze at the peak of each rep, slow return"},
      {id:"m4",name:"Smith Machine Shoulder Press",sets:"3",reps:"12",rest:"60 sec",who:"Both",note:"Ella: empieza con menos peso. El Smith ayuda con el balance y control"},
      {id:"m5",name:"Tricep Pushdown (Cable)",sets:"3",reps:"12-15",rest:"60 sec",who:"Both",note:"Keep elbows locked in at your sides, slow on the way back up"},
      {id:"m6",name:"Dumbbell Overhead Tricep Extension",sets:"3",reps:"12",rest:"60 sec",who:"Both",note:"One dumbbell held with both hands. Full stretch at the top"},
      {id:"m7",name:"Face Pull (Cable)",sets:"3",reps:"15",rest:"60 sec",who:"Both",note:"IMPORTANTE: Protege el hombro a largo plazo. Peso ligero, enfoque en la forma. No saltar este ejercicio"},
      {id:"m8",name:"Plank",sets:"3",reps:"40 sec",rest:"45 sec",who:"Both",note:"Core firme, no dejar caer las caderas. Respira normal"},
      {id:"m9",name:"Hanging Knee Raise / Lying Leg Raise",sets:"3",reps:"12-15",rest:"45 sec",who:"Both",note:"Recto abdominal inferior. Si hay barra, colgado. Si no, tumbado en banco. Sube las rodillas controlado, baja sin dejar caer"},
      {id:"m10",name:"Cable Woodchop / Oblique Twist",sets:"3",reps:"12/lado",rest:"45 sec",who:"Both",note:"Oblicuos y costados. Usa la polea baja o media. Rota el torso, no los pies. Este ejercicio define la cintura lateral"},
    ]
  },
  {
    id:"wednesday",label:"DAY 2",day:"WEDNESDAY",focus:"Back + Biceps + Hamstrings + Glutes",
    time:"~67 min",color:"#1A5E20",accent:"#27AE60",
    exercises:[
      {id:"w1",name:"Lat Pulldown Machine",sets:"3",reps:"12-15",rest:"60 sec",who:"Both",note:"Pull to the chest - NOT behind the neck. Protege la columna cervical"},
      {id:"w2",name:"Seated Cable Row",sets:"3",reps:"12-15",rest:"60 sec",who:"Both",note:"Squeeze shoulder blades together at the end of each rep"},
      {id:"w3",name:"Smith Machine Bent-Over Row",sets:"3",reps:"12",rest:"60 sec",who:"Both",note:"Compound movement. Espalda recta, no curvar la columna"},
      {id:"w4",name:"Dumbbell One-Arm Row",sets:"3",reps:"12/side",rest:"60 sec",who:"Both",note:"Use the bench for support. Tira el codo hacia arriba, no el peso"},
      {id:"w5",name:"Back Extension Machine",sets:"3",reps:"15",rest:"60 sec",who:"Both",note:"Fortalece espalda baja. Peso ligero al principio. Previene dolores lumbares"},
      {id:"w6",name:"Bicep Curl Machine",sets:"3",reps:"12-15",rest:"60 sec",who:"Both",note:"Good isolation at the end of the session"},
      {id:"w7",name:"Hammer Curl (Dumbbells)",sets:"3",reps:"12",rest:"60 sec",who:"Both",note:"Palmas mirando hacia adentro. Trabaja el brachialis y el bicep"},
      {id:"w8",name:"Seated Leg Curl Machine",sets:"3",reps:"12-15",rest:"60 sec",who:"Both",note:"Hámstrings. Segunda frecuencia semanal — clave para desarrollar glúteos. Control total en la bajada"},
      {id:"w9",name:"Cable Kickback / Glute Machine",sets:"3",reps:"15/lado",rest:"60 sec",who:"Both",note:"Glúteos segunda vez en la semana. Aprieta arriba del todo en cada rep"},
      {id:"w10",name:"Sumo Squat (Dumbbells)",sets:"3",reps:"15",rest:"60 sec",who:"Both",note:"Pies abiertos, puntas hacia afuera. Activa glúteos e isquiotibiales desde otro ángulo"},
    ]
  },
  {
    id:"friday",label:"DAY 3",day:"FRIDAY",focus:"Legs + Glutes + Shoulders + Core",
    time:"~65 min",color:"#6E2F0A",accent:"#E67E22",
    exercises:[
      {id:"f1",name:"Leg Press Machine",sets:"3",reps:"15",rest:"60 sec",who:"Both",note:"Feet shoulder-width apart. Do NOT lock your knees at the top"},
      {id:"f2",name:"Smith Machine Squat",sets:"3",reps:"12",rest:"60 sec",who:"Both",note:"Controlled descent, depth to 90 degrees. Espalda recta todo el tiempo"},
      {id:"f3",name:"Leg Extension Machine",sets:"3",reps:"15",rest:"60 sec",who:"Both",note:"Quad isolation. Aprieta al final del movimiento"},
      {id:"f4",name:"Leg Curl Machine",sets:"3",reps:"15",rest:"60 sec",who:"Both",note:"Hamstring focus. Control en la bajada"},
      {id:"f5",name:"Hip Abductor Machine",sets:"4",reps:"15-20",rest:"60 sec",who:"ELLA",note:"Prioridad para ella. Outer glute and hip. 4 series porque responde mejor"},
      {id:"f6",name:"Glute Kickback Machine",sets:"3",reps:"15",rest:"60 sec",who:"ELLA",note:"Squeeze at the top of every single rep. No rush"},
      {id:"f7",name:"Hip Thrust / Glute Bridge",sets:"3",reps:"12",rest:"60 sec",who:"EL",note:"Glute development que faltaba en la rutina. Peso progresivo"},
      {id:"f8",name:"Dumbbell Romanian Deadlift",sets:"3",reps:"12",rest:"60 sec",who:"Both",note:"Glutes + hamstrings. Espalda neutra, bajar hasta sentir el estiramiento"},
      {id:"f9",name:"Lateral Raise (Dumbbells)",sets:"3",reps:"15",rest:"60 sec",who:"Both",note:"Slow and controlled. No swinging. Peso ligero con buena forma"},
      {id:"f10",name:"Ab Crunch Machine",sets:"3",reps:"15-20",rest:"45 sec",who:"Both",note:"Exhala en cada rep. Aprieta el abdomen arriba del todo"},
      {id:"f11",name:"Russian Twist (con peso)",sets:"3",reps:"20 (10/lado)",rest:"45 sec",who:"Both",note:"Oblicuos. Siéntate en el suelo, pies levantados, gira el torso de lado a lado con un disco o mancuerna ligera"},
    ]
  }
];

const TIPS=[
  {icon:"🥩",title:"Proteina",body:"A los 50 el cuerpo necesita mas proteina que a los 30. Incluye proteina en cada comida principal. Sin buena nutricion, el gym hace solo la mitad del trabajo."},
  {icon:"😴",title:"Sueno",body:"El musculo crece mientras duermen, no mientras entrenan. 7-8 horas minimo. Dormir mal = recuperacion lenta = resultados lentos."},
  {icon:"📈",title:"Progresion",body:"Cada 6-8 semanas hay que subir el peso o cambiar algun ejercicio. Si no hay progresion, hay estancamiento. El cuerpo se adapta."},
  {icon:"🧘",title:"Mentalidad",body:"No se comparen entre ustedes. El cuerpo de cada uno responde diferente. Compitanse a ustedes mismos. El progreso es individual."},
];
const REST_OPTIONS=["Caminar 20-30 min","Stretching 15-20 min","Nadar / Bici recreativa","Yoga ligero en YouTube"];
const DAY_LABELS={monday:"Lunes",wednesday:"Miércoles",friday:"Viernes"};
const DAY_COLORS={monday:"#2E86C1",wednesday:"#27AE60",friday:"#E67E22"};

function getTodayDay(){const d=new Date().getDay();if(d===1)return"monday";if(d===3)return"wednesday";if(d===5)return"friday";return null;}
function getWeekKey(ds){const d=new Date(ds);const j=new Date(d.getFullYear(),0,1);const w=Math.ceil(((d-j)/86400000+j.getDay()+1)/7);return`${d.getFullYear()}-W${String(w).padStart(2,"0")}`;}
function formatDate(ds){return new Date(ds).toLocaleDateString("es-ES",{weekday:"short",month:"short",day:"numeric"});}

// localStorage storage shim (works outside Claude.ai)
const storage = {
  get: (k) => { try { const v = localStorage.getItem(k); return v ? {value: v} : null; } catch(e){ return null; } },
  set: (k, v) => { try { localStorage.setItem(k, v); return true; } catch(e){ return false; } },
};

function App(){
  const [activeTab,setActiveTab]=React.useState(()=>getTodayDay()||"monday");
  const [checked,setChecked]=React.useState({});
  const [completedDays,setCompletedDays]=React.useState({});
  const [history,setHistory]=React.useState([]);
  const [expandedNote,setExpandedNote]=React.useState(null);
  const [view,setView]=React.useState("workout");

  React.useEffect(()=>{
    try{const r=storage.get("wk_checked");if(r)setChecked(JSON.parse(r.value));}catch(e){}
    try{const r=storage.get("wk_completed");if(r)setCompletedDays(JSON.parse(r.value));}catch(e){}
    try{const r=storage.get("wk_history");if(r)setHistory(JSON.parse(r.value));}catch(e){}
  },[]);

  function toggleCheck(id){
    const next={...checked,[id]:!checked[id]};
    setChecked(next);
    storage.set("wk_checked",JSON.stringify(next));
  }

  function markDayDone(dayId){
    const today=new Date().toISOString().split("T")[0];
    const nc={...completedDays,[dayId]:today};
    setCompletedDays(nc);
    const day=DAYS.find(d=>d.id===dayId);
    const done=day.exercises.filter(ex=>checked[ex.id]).length;
    const entry={dayId,date:today,total:day.exercises.length,done};
    const nh=[entry,...history].slice(0,200);
    setHistory(nh);
    storage.set("wk_completed",JSON.stringify(nc));
    storage.set("wk_history",JSON.stringify(nh));
  }

  function resetDay(dayId){
    const day=DAYS.find(d=>d.id===dayId);
    const nc={...checked};day.exercises.forEach(ex=>{delete nc[ex.id];});setChecked(nc);
    const nd={...completedDays};delete nd[dayId];setCompletedDays(nd);
    storage.set("wk_checked",JSON.stringify(nc));
    storage.set("wk_completed",JSON.stringify(nd));
  }

  const totalSessions=history.length;
  const totalMinutes=history.reduce((a,e)=>a+(e.dayId==="monday"?60:e.dayId==="wednesday"?67:65),0);
  const weekMap={};history.forEach(e=>{const wk=getWeekKey(e.date);if(!weekMap[wk])weekMap[wk]=[];weekMap[wk].push(e);});
  const weeks=Object.entries(weekMap).sort((a,b)=>b[0].localeCompare(a[0]));
  let streak=0;for(const[,en]of weeks){if(en.length>=3)streak++;else break;}
  const last8=weeks.slice(0,8).reverse();

  const cd=DAYS.find(d=>d.id===activeTab);
  const doneCount=cd?cd.exercises.filter(ex=>checked[ex.id]).length:0;
  const total=cd?cd.exercises.length:0;
  const pct=total>0?Math.round((doneCount/total)*100):0;

  const S={
    page:{minHeight:"100vh",background:"linear-gradient(135deg,#0D1B2A 0%,#1B2838 50%,#0D1B2A 100%)",paddingBottom:40},
    hdr:{background:"linear-gradient(180deg,#0A1628 0%,transparent 100%)",padding:"24px 20px 16px",textAlign:"center",borderBottom:"1px solid rgba(200,170,100,0.2)"},
    nav:{display:"flex",borderBottom:"1px solid rgba(200,170,100,0.15)",background:"rgba(0,0,0,0.3)"},
    navBtn:(active)=>({flex:1,padding:"12px 4px",border:"none",background:"transparent",color:active?"#C8AA64":"#6A7D8F",fontSize:9,letterSpacing:2,cursor:"pointer",borderBottom:active?"2px solid #C8AA64":"2px solid transparent",fontFamily:"monospace",fontWeight:"bold"}),
    card:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:16,marginBottom:12},
    sectionLabel:{fontSize:10,letterSpacing:4,color:"#6A7D8F",fontFamily:"monospace",marginBottom:12},
  };

  const TABS=[{id:"workout",label:"WORKOUT"},{id:"historial",label:"HISTORIAL"},{id:"tips",label:"TIPS"},{id:"rest",label:"DESCANSO"}];

  return(
    <div style={S.page}>
      {/* Header */}
      <div style={S.hdr}>
        <div style={{fontSize:11,letterSpacing:6,color:"#C8AA64",marginBottom:4,fontFamily:"monospace"}}>VANTERRA GROUP</div>
        <div style={{fontSize:26,fontWeight:"bold",letterSpacing:2,color:"#F0E6CC"}}>COUPLES WORKOUT</div>
        <div style={{fontSize:12,color:"#8A9BB5",marginTop:4,letterSpacing:1}}>Planet Fitness · Mon / Wed / Fri</div>
      </div>

      {/* Nav */}
      <div style={S.nav}>
        {TABS.map(t=><button key={t.id} onClick={()=>setView(t.id)} style={S.navBtn(view===t.id)}>{t.label}</button>)}
      </div>

      {/* WORKOUT */}
      {view==="workout"&&(
        <div>
          <div style={{display:"flex",gap:8,padding:"16px 16px 8px"}}>
            {DAYS.map(day=>{
              const isDone=completedDays[day.id];const isActive=activeTab===day.id;const isToday=getTodayDay()===day.id;
              return(
                <button key={day.id} onClick={()=>setActiveTab(day.id)} style={{flex:1,padding:"10px 4px",borderRadius:8,border:"none",background:isActive?`linear-gradient(135deg,${day.color},${day.accent})`:isDone?"rgba(50,80,50,0.4)":"rgba(255,255,255,0.06)",cursor:"pointer",position:"relative",boxShadow:isActive?`0 4px 20px ${day.accent}40`:"none"}}>
                  <div style={{fontSize:9,letterSpacing:2,color:isActive?"rgba(255,255,255,0.7)":"#4A6070",fontFamily:"monospace"}}>{day.label}</div>
                  <div style={{fontSize:11,fontWeight:"bold",color:isActive?"#fff":"#8A9BB5",marginTop:2}}>{day.day.slice(0,3)}</div>
                  {isDone&&<div style={{position:"absolute",top:4,right:6,fontSize:10}}>✓</div>}
                  {isToday&&!isActive&&<div style={{position:"absolute",top:-3,left:"50%",transform:"translateX(-50%)",width:6,height:6,borderRadius:"50%",background:"#C8AA64"}}/>}
                </button>
              );
            })}
          </div>

          <div style={{padding:"8px 16px 12px"}}>
            <div style={{background:`linear-gradient(135deg,${cd.color}CC,${cd.accent}44)`,borderRadius:10,padding:"14px 16px",border:`1px solid ${cd.accent}40`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontSize:18,fontWeight:"bold",color:"#F0E6CC",letterSpacing:1}}>{cd.day}</div>
                  <div style={{fontSize:12,color:"#B8C8D8",marginTop:2}}>{cd.focus}</div>
                  <div style={{fontSize:11,color:cd.accent,marginTop:4,fontFamily:"monospace"}}>{cd.time} · {total} exercises</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:28,fontWeight:"bold",color:pct===100?"#4CAF50":"#C8AA64"}}>{pct}%</div>
                  <div style={{fontSize:10,color:"#6A7D8F",fontFamily:"monospace"}}>{doneCount}/{total} done</div>
                </div>
              </div>
              <div style={{marginTop:10,height:4,background:"rgba(0,0,0,0.3)",borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct}%`,background:pct===100?"#4CAF50":`linear-gradient(90deg,${cd.color},${cd.accent})`,borderRadius:4,transition:"width 0.4s ease"}}/>
              </div>
            </div>
          </div>

          <div style={{margin:"0 16px 10px",padding:"10px 14px",background:"rgba(200,170,100,0.1)",borderRadius:8,border:"1px solid rgba(200,170,100,0.25)",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:16}}>⚡</span>
            <span style={{fontSize:12,color:"#C8AA64"}}><strong>WARMUP PRIMERO:</strong> 5 min en bicicleta o treadmill caminando antes de empezar</span>
          </div>

          <div style={{padding:"0 16px 16px"}}>
            {cd.exercises.map(ex=>{
              const done=!!checked[ex.id];const noteOpen=expandedNote===ex.id;
              const isElla=ex.who==="ELLA";const isEl=ex.who==="EL";
              return(
                <div key={ex.id} style={{background:done?"rgba(40,80,40,0.35)":"rgba(255,255,255,0.04)",border:done?"1px solid rgba(76,175,80,0.4)":"1px solid rgba(255,255,255,0.07)",borderRadius:10,marginBottom:8,overflow:"hidden",opacity:done?0.75:1}}>
                  <div style={{display:"flex",alignItems:"center",padding:"12px 14px",gap:12}}>
                    <button onClick={()=>toggleCheck(ex.id)} style={{width:26,height:26,borderRadius:6,border:"none",background:done?"#4CAF50":"rgba(255,255,255,0.1)",color:"#fff",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {done?"✓":""}
                    </button>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <span style={{fontSize:14,fontWeight:"bold",color:done?"#7CB87E":"#E8DCC8",textDecoration:done?"line-through":"none"}}>{ex.name}</span>
                        {(isElla||isEl)&&<span style={{fontSize:9,fontFamily:"monospace",letterSpacing:1,padding:"2px 6px",borderRadius:4,background:isElla?"rgba(200,100,150,0.25)":"rgba(100,150,200,0.25)",color:isElla?"#E8A0C0":"#A0C8E8",border:isElla?"1px solid rgba(200,100,150,0.4)":"1px solid rgba(100,150,200,0.4)"}}>{ex.who}</span>}
                      </div>
                      <div style={{display:"flex",gap:12,marginTop:4}}>
                        {[{l:"Sets",v:ex.sets},{l:"Reps",v:ex.reps},{l:"Rest",v:ex.rest}].map(s=>(
                          <div key={s.l} style={{textAlign:"center"}}>
                            <div style={{fontSize:13,fontWeight:"bold",color:cd.accent}}>{s.v}</div>
                            <div style={{fontSize:9,color:"#5A6E80",fontFamily:"monospace",letterSpacing:1}}>{s.l}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                    <button onClick={()=>setExpandedNote(noteOpen?null:ex.id)} style={{width:28,height:28,borderRadius:6,border:"none",background:noteOpen?"rgba(200,170,100,0.2)":"rgba(255,255,255,0.06)",color:noteOpen?"#C8AA64":"#5A6E80",fontSize:14,cursor:"pointer",flexShrink:0}}>i</button>
                  </div>
                  {noteOpen&&<div style={{padding:"10px 14px 12px 52px",background:"rgba(200,170,100,0.06)",borderTop:"1px solid rgba(200,170,100,0.15)",fontSize:13,color:"#B8A880",lineHeight:1.5,fontStyle:"italic"}}>{ex.note}</div>}
                </div>
              );
            })}
          </div>

          {pct===100&&!completedDays[cd.id]&&(
            <div style={{padding:"0 16px 16px"}}>
              <button onClick={()=>markDayDone(cd.id)} style={{width:"100%",padding:14,borderRadius:10,border:"none",background:"linear-gradient(135deg,#2E7D32,#4CAF50)",color:"#fff",fontSize:15,fontWeight:"bold",cursor:"pointer",letterSpacing:2,fontFamily:"monospace",boxShadow:"0 4px 20px rgba(76,175,80,0.4)"}}>
                ✓ MARCAR DIA COMPLETADO
              </button>
            </div>
          )}
          {completedDays[cd.id]&&(
            <div style={{padding:"0 16px 12px"}}>
              <div style={{padding:"12px 16px",borderRadius:10,background:"rgba(40,80,40,0.4)",border:"1px solid rgba(76,175,80,0.4)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,color:"#7CB87E"}}>Completado ✓</span>
                <button onClick={()=>resetDay(cd.id)} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.15)",color:"#5A6E80",fontSize:11,padding:"4px 10px",borderRadius:5,cursor:"pointer",fontFamily:"monospace"}}>reset</button>
              </div>
            </div>
          )}
          <div style={{margin:"0 16px 24px",padding:"10px 14px",background:"rgba(46,134,193,0.1)",borderRadius:8,border:"1px solid rgba(46,134,193,0.2)"}}>
            <span style={{fontSize:12,color:"#7FB3D3"}}><strong>CARDIO OPCIONAL:</strong> 10-15 min en elliptical o bike al final.</span>
          </div>
        </div>
      )}

      {/* HISTORIAL */}
      {view==="historial"&&(
        <div style={{padding:16}}>
          <div style={{fontSize:11,letterSpacing:4,color:"#C8AA64",marginBottom:16,fontFamily:"monospace",textAlign:"center"}}>PROGRESO ACUMULADO</div>
          <div style={{display:"flex",gap:10,marginBottom:16}}>
            {[{label:"Entrenos",value:totalSessions,icon:"🏋️"},{label:"Semanas completas",value:streak,icon:"🔥"},{label:"Horas totales",value:Math.round(totalMinutes/60),icon:"⏱️"}].map((s,i)=>(
              <div key={i} style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(200,170,100,0.2)",borderRadius:10,padding:"14px 8px",textAlign:"center"}}>
                <div style={{fontSize:20}}>{s.icon}</div>
                <div style={{fontSize:26,fontWeight:"bold",color:"#C8AA64",lineHeight:1.2}}>{s.value}</div>
                <div style={{fontSize:9,color:"#5A6E80",fontFamily:"monospace",letterSpacing:1,marginTop:2}}>{s.label.toUpperCase()}</div>
              </div>
            ))}
          </div>

          {last8.length>0&&(
            <div style={{...S.card,marginBottom:16}}>
              <div style={S.sectionLabel}>ÚLTIMAS SEMANAS</div>
              <div style={{display:"flex",gap:6,alignItems:"flex-end"}}>
                {last8.map(([wk,entries])=>{
                  const n=entries.length;const full=n>=3;const h=20+n*14;
                  return(
                    <div key={wk} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                      <div style={{fontSize:9,color:full?"#4CAF50":"#C8AA64",fontFamily:"monospace"}}>{n}/3</div>
                      <div style={{width:"100%",height:h,borderRadius:5,background:full?"linear-gradient(180deg,#2E7D32,#4CAF50)":n===2?"linear-gradient(180deg,#7D6000,#C8AA64)":"linear-gradient(180deg,#5C2800,#E67E22)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>{full?"✓":""}</div>
                      <div style={{fontSize:8,color:"#4A5E70",fontFamily:"monospace"}}>{wk.split("-W")[1]}w</div>
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:12,marginTop:12,justifyContent:"center",flexWrap:"wrap"}}>
                {[{color:"#4CAF50",label:"Completa (3/3)"},{color:"#C8AA64",label:"Parcial (2/3)"},{color:"#E67E22",label:"Inicio (1/3)"}].map(l=>(
                  <div key={l.label} style={{display:"flex",alignItems:"center",gap:4}}>
                    <div style={{width:8,height:8,borderRadius:2,background:l.color}}/>
                    <span style={{fontSize:9,color:"#5A6E80",fontFamily:"monospace"}}>{l.label}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {totalSessions>0&&(
            <div style={{background:"rgba(200,170,100,0.1)",border:"1px solid rgba(200,170,100,0.3)",borderRadius:10,padding:"14px 16px",marginBottom:16,textAlign:"center"}}>
              <div style={{fontSize:13,color:"#C8AA64",lineHeight:1.6}}>
                {streak>=4?`🏆 ${streak} semanas seguidas completas. Eso es consistencia de verdad.`:streak>=2?`💪 ${streak} semanas completas seguidas. Sigan así.`:totalSessions>=6?"📈 Más de 6 entrenos en el registro. El hábito se está formando.":totalSessions>=1?"🌱 El primer paso está dado. Cada entreno cuenta.":""}
              </div>
            </div>
          )}

          <div style={{...S.card,padding:0,overflow:"hidden"}}>
            <div style={{padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,0.06)",fontSize:10,letterSpacing:3,color:"#6A7D8F",fontFamily:"monospace"}}>REGISTRO DETALLADO</div>
            {history.length===0?(
              <div style={{padding:"32px 16px",textAlign:"center",color:"#4A5E70",fontSize:13}}>
                Aún no hay entrenos registrados.<br/>
                <span style={{fontSize:11,color:"#3A4E60"}}>Completa tu primer día y aparecerá aquí.</span>
              </div>
            ):weeks.map(([wk,entries])=>{
              const full=entries.length>=3;
              return(
                <div key={wk}>
                  <div style={{padding:"8px 16px",background:"rgba(0,0,0,0.2)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:10,color:"#5A6E80",fontFamily:"monospace",letterSpacing:2}}>SEMANA {wk.split("-W")[1]}</span>
                    {full&&<span style={{fontSize:10,color:"#4CAF50",fontFamily:"monospace"}}>COMPLETA ✓</span>}
                  </div>
                  {entries.sort((a,b)=>b.date.localeCompare(a.date)).map((e,i)=>(
                    <div key={i} style={{padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:10,height:10,borderRadius:"50%",background:DAY_COLORS[e.dayId],flexShrink:0}}/>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,color:"#D0C0A0"}}>{DAY_LABELS[e.dayId]}</div>
                        <div style={{fontSize:11,color:"#4A6070",fontFamily:"monospace"}}>{formatDate(e.date)}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:13,color:e.done===e.total?"#4CAF50":"#C8AA64",fontWeight:"bold"}}>{e.done}/{e.total}</div>
                        <div style={{fontSize:9,color:"#4A6070",fontFamily:"monospace"}}>ejercicios</div>
                      </div>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* TIPS */}
      {view==="tips"&&(
        <div style={{padding:16}}>
          <div style={{fontSize:11,letterSpacing:4,color:"#C8AA64",marginBottom:16,fontFamily:"monospace",textAlign:"center"}}>FACTORES FUERA DEL GYM</div>
          {TIPS.map((tip,i)=>(
            <div key={i} style={S.card}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
                <span style={{fontSize:24}}>{tip.icon}</span>
                <span style={{fontSize:16,fontWeight:"bold",color:"#C8AA64",letterSpacing:1}}>{tip.title.toUpperCase()}</span>
              </div>
              <p style={{margin:0,fontSize:14,color:"#9AAFC0",lineHeight:1.6}}>{tip.body}</p>
            </div>
          ))}
          <div style={{padding:"14px 16px",background:"rgba(200,170,100,0.1)",borderRadius:10,border:"1px solid rgba(200,170,100,0.3)"}}>
            <div style={{fontSize:13,color:"#C8AA64",fontWeight:"bold",marginBottom:6}}>REGLA DE ORO</div>
            <div style={{fontSize:13,color:"#9AAFC0",lineHeight:1.6}}>Consistencia supera la intensidad. Tres dias bien hechos cada semana durante meses les va a cambiar el cuerpo completamente.</div>
          </div>
        </div>
      )}

      {/* DESCANSO */}
      {view==="rest"&&(
        <div style={{padding:16}}>
          <div style={{fontSize:11,letterSpacing:4,color:"#C8AA64",marginBottom:8,fontFamily:"monospace",textAlign:"center"}}>DIAS LIBRES</div>
          <div style={{fontSize:13,color:"#6A7D8F",textAlign:"center",marginBottom:20,lineHeight:1.5}}>Escojan lo que apetezca. La idea es moverse sin estresarle el cuerpo.</div>
          {REST_OPTIONS.map((opt,i)=>(
            <div key={i} style={{...S.card,padding:"16px 18px",display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:32,height:32,borderRadius:8,background:"rgba(58,124,165,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>
                {["🚶","🧘","🏊","🧘"][i]}
              </div>
              <span style={{fontSize:15,color:"#C8D8E8"}}>{opt}</span>
            </div>
          ))}
          <div style={{padding:"14px 16px",background:"rgba(50,80,50,0.3)",borderRadius:10,border:"1px solid rgba(76,175,80,0.25)",marginTop:6}}>
            <div style={{fontSize:12,color:"#7CB87E",lineHeight:1.6}}><strong>Dia libre ideal:</strong> Una caminata de 20-25 minutos + 10 minutos de estiramiento.</div>
          </div>
          <div style={{marginTop:10,padding:"14px 16px",background:"rgba(200,100,50,0.1)",borderRadius:10,border:"1px solid rgba(200,100,50,0.2)"}}>
            <div style={{fontSize:12,color:"#D4876A",lineHeight:1.6}}><strong>Evitar en dias libres:</strong> Ejercicio intenso o querer recuperar una sesion perdida. El descanso es parte del proceso.</div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
